services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: clinic
      POSTGRES_USER: clinic
      POSTGRES_PASSWORD: clinic
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    environment:
      APP_ENV: dev
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
      DATABASE_URL: postgresql+psycopg://clinic:clinic@db:5432/clinic
      JWT_SECRET_KEY: change-me-in-prod
      JWT_ACCESS_TOKEN_EXPIRES_MINUTES: 30
      JWT_REFRESH_TOKEN_EXPIRES_DAYS: 14
      CORS_ORIGINS: http://localhost:5173
      SEED_ON_STARTUP: "true"
    depends_on:
      - db
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    depends_on:
      - backend
    ports:
      - "5173:5173"

volumes:
  db_data:
